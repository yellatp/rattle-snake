name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Rattle-Snake better? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction you're experiencing.
      placeholder: "Currently when I do X, I have to manually Y which is tedious..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Resume generation
        - ATS scoring
        - Templates / roles
        - AI providers
        - User profiles
        - Export (PDF / DOCX / TXT)
        - Cover letters
        - Interview prep
        - Job tracker
        - UI / UX
        - Performance
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches that could work.

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to work on this?
      options:
        - label: "Yes, I'd like to open a PR for this feature"
